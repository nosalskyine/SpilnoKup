<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Spil</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0e1320" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Spil" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Description for social share -->
    <meta name="description" content="Спільні покупки від малого бізнесу України" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #0e1320; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; overscroll-behavior: none; }
      #root { min-height: 100vh; overflow-x: hidden; }
      button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          const reg = await navigator.serviceWorker.register('/sw.js');
          // Auto-update every 30 seconds
          setInterval(() => reg.update(), 30000);
          // When new version found — activate immediately
          reg.addEventListener('updatefound', () => {
            const sw = reg.installing;
            sw.addEventListener('statechange', () => {
              if (sw.state === 'activated') location.reload();
            });
          });
        });
      }
    </script>
  </body>
</html>
